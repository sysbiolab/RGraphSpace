# Workflow para pacotes R usando pkgdown e GitHub Actions nativo
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.ref }}
    
    # Define o ambiente oficial para o GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(install = FALSE)
        shell: Rscript {0}

      # PASSO CHAVE 1: Transforma a pasta docs em um artefato oficial
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

      # PASSO CHAVE 2: Faz o deployment real usando o sinal do Actions
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        